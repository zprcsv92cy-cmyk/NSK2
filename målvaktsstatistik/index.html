<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Målvaktsstatistik</title>
<link rel="stylesheet" href="/NSK2/app.css">
</head>
<body>
<div class="wrap">
  <nav class="mainmenu">
  <a href="/NSK2/startsida/">Startsida</a>
  <a href="/NSK2/truppen/">Truppen</a>
  <a href="/NSK2/skapapoolspel/">Skapa poolspel</a>
  <a href="/NSK2/malvaktsstatistik/">Målvaktsstatistik</a>
  <a href="/NSK2/bytesschema/">Bytesschema</a>
  <a href="/NSK2/matchvy/">Matchvy</a>
  <a href="/NSK2/lag/">Lag</a>
</nav>
  <section class="card">
    <h1>Målvaktsstatistik</h1>
    <label>Målvakt</label>
    <input id="goalieName" placeholder="Namn">
    <label>Skott</label>
    <input id="goalieShots" type="number">
    <label>Räddningar</label>
    <input id="goalieSaves" type="number">
    <label>Insläppta</label>
    <input id="goalieGoals" type="number">
    <button id="saveGoalieStatBtn">Spara statistik</button>
    <div id="goalieMsg" class="small"></div>
  </section>
  <section class="card">
    <h2>Historik</h2>
    <div id="goalieStatsList"></div>
  </section>
</div>
<script src="/NSK2/app.js"></script>
</body>
</html>
