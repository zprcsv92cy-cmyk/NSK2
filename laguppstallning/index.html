<section class="hero-card">

<div>
<h1 class="hero-title">Laguppställning</h1>

</div>
</section>

<section class="card">
<h2>Lag</h2>
<div id="laguppstallningTeamButtons" class="team-buttons"></div>

<label>Match</label>
<select id="lineupMatch"></select>

<label>Starttid</label>
<input id="lineupStartTime" type="time">

<label>Motståndare</label>

<label>Plan</label>
<select id="lineupPlan">
<option>Plan 1</option>
<option>Plan 2</option>

</select>

<select id="lineupPlayerCount"></select>
</section>

<section class="card">
<h2>Laguppställning</h2>

<div id="lineupSelectors"></div>

<button id="saveLagMatchBtn">Spara</button>
<div id="lineupMsg" class="small"></div>

<div id="appError"></div>
