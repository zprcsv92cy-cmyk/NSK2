<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Laguppställning</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=708"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/">Bytesschema</a>
      <a href="../matchvy/">Matchvy</a>
      <a href="../lag/" class="active">Lag</a>
    </nav>

    <section class="hero-card">
      <img src="../icon-192.png" alt="NSK" class="hero-logo">
      <div>
        <h1 class="hero-title">Laguppställning</h1>
        <div id="laguppstallningTitle" class="hero-sub">Lag 1 • Match 1</div>
      </div>
    </section>

    <section class="card">
      <h2>Laguppställning</h2>

      <div id="laguppstallningTeamButtons" class="team-buttons"></div>

      <div class="coach-block">
        <label for="lineupCoach">Tränare</label>
        <select id="lineupCoach" multiple></select>
      </div>

      <div class="match-buttons-wrap">
        <div class="small">Matcher</div>
        <div id="matchButtons" class="team-buttons"></div>
      </div>

      <select id="lineupMatch" style="display:none"></select>
    </section>

    <section class="card">
      <h2>Matchinfo</h2>

      <label for="lineupStartTime">Starttid</label>
      <input id="lineupStartTime" type="time">

      <label for="lineupOpponent">Motståndare</label>
      <input id="lineupOpponent" type="text" placeholder="Motståndare">

      <label for="lineupPlan">Plan</label>
      <select id="lineupPlan">
        <option value="Plan 1">Plan 1</option>
        <option value="Plan 2">Plan 2</option>
        <option value="Plan 3">Plan 3</option>
        <option value="Plan 4">Plan 4</option>
      </select>

      <label for="lineupPlayerCount">Antal spelare</label>
      <select id="lineupPlayerCount"></select>
    </section>

    <section class="card">
      <h2>Spelare</h2>
      <div id="lineupSelectors"></div>
      <div id="lineupMsg" class="small"></div>
    </section>

    <div id="appError" class="small"></div>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
</script>
  </div>
</body>
</html>
