<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Startsida</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=717"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>

  <style>
    .start-pool-btn{
      width:100%;
      min-height:78px;
      border-radius:22px;
      font-size:24px;
      font-weight:900;
      background:linear-gradient(180deg,#e11d3d,#9f0d20);
      color:#fff;
      border:1px solid rgba(255,255,255,.16);
      box-shadow:0 10px 24px rgba(0,0,0,.22);
    }
    .start-pool-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }
    .selected-pool-box{
      margin-top:12px;
      padding:14px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/" class="active">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/">Bytesschema</a>
      <a href="../matchvy/">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="home-hero">
      <div class="home-hero-logo-box">
        <img src="../icon-192.png" alt="NSK" class="home-hero-logo">
      </div>
      <div class="home-hero-text">
        <h1>Startsida</h1>
        <div class="home-hero-sub">Sparade poolspel och snabbval</div>
      </div>
    </section>

    <section class="card home-shortcuts">
      <a class="home-shortcut primary" href="../skapapoolspel/">Skapa poolspel</a>
      <a class="home-shortcut" href="../truppen/">Truppen</a>
      <a class="home-shortcut" href="../malvaktsstatistik/">Målvaktsstatistik</a>
    </section>

    <section class="card">
      <h2>Sparade poolspel</h2>
      <div id="savedPoolsList"></div>
    </section>

    <section class="card">
      <button id="startPoolBtn" class="start-pool-btn" type="button">Påbörja poolspel</button>
      <div id="selectedPoolBox" class="selected-pool-box small">Välj först ett poolspel från listan ovan.</div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
    </script>

    <script>
      document.addEventListener('DOMContentLoaded', async () => {
        const btn = document.getElementById('startPoolBtn');
        const info = document.getElementById('selectedPoolBox');

        async function refreshSelectedPoolInfo(){
          const poolId = sessionStorage.getItem('nsk2_pool_id') || '';
          if (!poolId) {
            if (info) info.textContent = 'Välj först ett poolspel från listan ovan.';
            if (btn) btn.disabled = true;
            return;
          }

          try {
            const pool = await DB.getPool(poolId);
            if (!pool) {
              if (info) info.textContent = 'Välj först ett poolspel från listan ovan.';
              if (btn) btn.disabled = true;
              return;
            }

            if (info) {
              info.textContent = `Valt poolspel: ${pool.place || 'Ort'} • ${pool.pool_date || 'Datum'} • ${pool.title || 'Poolspel'}`;
            }
            if (btn) btn.disabled = false;
          } catch {
            if (btn) btn.disabled = false;
          }
        }

        document.addEventListener('click', (e) => {
          const t = e.target;
          if (!(t instanceof HTMLElement)) return;
          if (t.dataset.poolId || t.dataset.poolShifts || t.dataset.editPool) {
            setTimeout(refreshSelectedPoolInfo, 50);
          }
        });

        if (btn) {
          btn.addEventListener('click', () => {
            const poolId = sessionStorage.getItem('nsk2_pool_id') || '';
            if (!poolId) {
              if (info) info.textContent = 'Välj först ett poolspel från listan ovan.';
              return;
            }
            window.location.href = '../lag/';
          });
        }

        await refreshSelectedPoolInfo();
      });
    </script>
  </div>
</body>
</html>
