<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bytesschema</title>
  <script src="../version.js?v=710"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/" class="active">Bytesschema</a>
      <a href="../matchvy/">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="hero-card">
      <img src="../icon-192.png" alt="NSK" class="hero-logo">
      <div>
        <h1 class="hero-title">Bytesschema</h1>
        <div id="bytesschemaTitle" class="hero-sub">Lag 1 • Match 1</div>
      </div>
    </section>

    <section class="card">
      <h2>Bytesschema</h2>
      <div id="shiftTeamButtons" class="team-buttons"></div>
      <div class="match-buttons-wrap">
        <div class="small">Matcher</div>
        <div id="shiftMatchButtons" class="team-buttons"></div>
      </div>
      <select id="shiftMatch" style="display:none"></select>
      <div id="shiftMsg" class="small"></div>
    </section>

    <section class="card">
      <div class="shift-header">
        <div class="shift-header-left">
          <strong id="shiftHeaderMain">Match 1 • Lag 1</strong>
        </div>
        <div class="shift-header-right">
          <div>Start: <span id="shiftStart">—</span> • Datum: <span id="shiftDate">—</span></div>
          <div>Motståndare: <span id="shiftOpponent">—</span> • Plan: <span id="shiftPlan">—</span></div>
        </div>
      </div>

      <div class="shift-badges">
        <span class="shift-badge">Tränare</span>
        <span id="shiftCoachNames">—</span>
        <span class="shift-badge">Målvakt</span>
        <span id="shiftGoalieName">—</span>
      </div>

      <div id="shiftTableWrap"></div>
    </section>

    <div id="appError" class="small"></div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
    </script>
  </div>
</body>
</html>
