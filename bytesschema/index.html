<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bytesschema</title>
  <link rel="stylesheet" href="/NSK2/app.css?v=655">
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="/NSK2/startsida/">Startsida</a>
      <a href="/NSK2/truppen/">Truppen</a>
      <a href="/NSK2/skapapoolspel/">Skapa poolspel</a>
      <a href="/NSK2/malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="/NSK2/bytesschema/" class="active">Bytesschema</a>
      <a href="/NSK2/matchvy/">Matchvy</a>
      <a href="/NSK2/lag/">Lag</a>
    </nav>

    <section class="hero-card">
      <img src="/NSK2/icon-192.png" alt="NSK" class="hero-logo">
      <div>
        <h1 class="hero-title">Bytesschema</h1>
        <div id="bytesschemaTitle" class="hero-sub">Lag 1 • Match 1</div>
      </div>
    </section>

    <section class="card">
      <h2>Bytesschema</h2>
      <div id="shiftTeamButtons" class="team-buttons"></div>
      <div class="match-buttons-wrap">
        <div class="small">Matcher</div>
        <div id="shiftMatchButtons" class="team-buttons"></div>
      </div>
      <select id="shiftMatch" style="display:none"></select>
      <div id="shiftMsg" class="small"></div>
    </section>

    <section class="card">
      <div class="shift-header">
        <div class="shift-header-left">
          <strong id="shiftHeaderMain">Match 1 • Lag 1</strong>
        </div>
        <div class="shift-header-right">
          <div>Start: <span id="shiftStart">—</span> • Datum: <span id="shiftDate">—</span></div>
          <div>Motståndare: <span id="shiftOpponent">—</span> • Plan: <span id="shiftPlan">—</span></div>
        </div>
      </div>

      <div class="shift-badges">
        <span class="shift-badge">Tränare</span>
        <span id="shiftCoachNames">—</span>
        <span class="shift-badge">Målvakt</span>
        <span id="shiftGoalieName">—</span>
      </div>

      <div id="shiftTableWrap"></div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/NSK2/config.js?v=655"></script>
    <script src="/NSK2/auth.js?v=655"></script>
    <script src="/NSK2/login-patch.js?v=655"></script>
    <script src="/NSK2/db.js?v=655"></script>
    <script src="/NSK2/app.js?v=655"></script>
  </div>
</body>
</html>
