<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bytesschema</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=718"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/" class="active">Bytesschema</a>
      <a href="../matchvy/">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="home-hero">
      <div class="home-hero-logo-box">
        <img src="../icon-192.png" alt="NSK" class="home-hero-logo">
      </div>
      <div class="home-hero-text">
        <h1 id="bytesschemaTitle">Bytesschema</h1>
        <div class="home-hero-sub" id="shiftHeaderMain">Lag 1 • Match 1</div>
      </div>
    </section>

    <section class="card">
      <h2>Bytesschema</h2>
      <div id="shiftTeamButtons" class="team-buttons"></div>
      <input id="shiftMatch" type="hidden" value="1">
      <div id="shiftMatchList" class="match-list-stack"></div>
    </section>

    <section class="card">
      <h2>Matchdetaljer</h2>
      <div class="small">Start: <span id="shiftStart">—</span> • Datum: <span id="shiftDate">—</span></div>
      <div class="small">Motståndare: <span id="shiftOpponent">—</span> • Plan: <span id="shiftPlan">—</span></div>
      <div class="small">Tränare <span id="shiftCoachNames">—</span> • Målvakt <span id="shiftGoalieName">—</span></div>
    </section>

    <section class="card">
      <div id="shiftTableWrap"></div>
      <div id="shiftMsg" class="small"></div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
    </script>
  </div>
</body>
</html>
