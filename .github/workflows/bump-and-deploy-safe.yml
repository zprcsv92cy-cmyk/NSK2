name: Bump and Deploy NSK Safe

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Ny version, t.ex. 701"
        required: true
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update version safely
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e

          echo "Sätter version till $VERSION"

          # version.js
          if [ -f version.js ]; then
            cat > version.js <<EOF
          window.NSK_VERSION = "$VERSION";
          EOF
          else
            echo 'window.NSK_VERSION = "'"$VERSION"'";' > version.js
          fi

          # deploy.json
          cat > deploy.json <<EOF
          {
            "version": "$VERSION"
          }
          EOF

          # manifest.webmanifest
          if [ -f manifest.webmanifest ]; then
            sed -i -E 's/"version":[[:space:]]*"[^"]*"/"version": "'"$VERSION"'"/g' manifest.webmanifest || true
            sed -i -E 's#"start_url":[[:space:]]*"[^"]*"#"start_url": "./?v='"$VERSION"'"#g' manifest.webmanifest || true
          fi

          # sw.js - uppdatera bara versionssträngar
          if [ -f sw.js ]; then
            sed -i -E 's/(const VERSION = ")[^"]+(")/\1'"$VERSION"'\2/g' sw.js || true
            sed -i -E 's/(const CACHE_NAME = "nsk-team18-v)[^"]+(")/\1'"$VERSION"'\2/g' sw.js || true
            sed -i -E 's/(nsk-team18-v)[0-9]+/\1'"$VERSION"'/g' sw.js || true

            sed -i -E 's/(index\.html\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(version\.js\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(deploy\.json\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(app\.css\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(config\.js\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(auth\.js\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(login-patch\.js\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(db\.js\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(app\.js\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
            sed -i -E 's/(manifest\.webmanifest\?v=)[0-9]+/\1'"$VERSION"'/g' sw.js || true
          fi

          # Alla html-filer
          find . -name "*.html" -type f | while read -r file; do
            sed -i -E 's/(app\.css\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(config\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(auth\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(login-patch\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(db\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(app\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(version\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
          done

      - name: Commit version bump
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Bump version to $VERSION" || echo "Inga ändringar att committa"
          git push

  deploy:
    needs: bump
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout updated repo
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4