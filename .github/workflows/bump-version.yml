name: Bump NSK version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Ny version, t.ex. 701"
        required: true
        type: string

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set version
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          echo "Sätter version till $VERSION"

          # 1. version.js
          cat > version.js <<EOF
          window.NSK_VERSION = "$VERSION";
          EOF

          # 2. deploy.json
          cat > deploy.json <<EOF
          {
            "version": "$VERSION"
          }
          EOF

          # 3. sw.js
          cat > sw.js <<EOF
          const VERSION = "$VERSION";
          const CACHE_NAME = "nsk-team18-v" + VERSION;

          const ASSETS = [
            "./",
            "./index.html?v=$VERSION",
            "./version.js?v=$VERSION",
            "./deploy.json?v=$VERSION",
            "./app.css?v=$VERSION",
            "./config.js?v=$VERSION",
            "./auth.js?v=$VERSION",
            "./login-patch.js?v=$VERSION",
            "./db.js?v=$VERSION",
            "./app.js?v=$VERSION",
            "./manifest.webmanifest?v=$VERSION",
            "./icon-192.png",
            "./icon-512.png"
          ];

          self.addEventListener("install", (event) => {
            event.waitUntil(
              caches.open(CACHE_NAME).then((cache) => cache.addAll(ASSETS))
            );
          });

          self.addEventListener("activate", (event) => {
            event.waitUntil(
              caches.keys().then((keys) =>
                Promise.all(
                  keys
                    .filter((key) => key !== CACHE_NAME)
                    .map((key) => caches.delete(key))
                )
              ).then(() => self.clients.claim())
            );
          });

          self.addEventListener("fetch", (event) => {
            event.respondWith(
              caches.match(event.request).then((cached) => cached || fetch(event.request))
            );
          });
          EOF

          # 4. Uppdatera manifest.webmanifest version/start_url om filen finns
          if [ -f manifest.webmanifest ]; then
            sed -i 's/"version":[[:space:]]*"[^"]*"/"version": "'"$VERSION"'"/g' manifest.webmanifest || true
            sed -i 's#"start_url":[[:space:]]*"[^"]*"#"start_url": "./?v='"$VERSION"'"#g' manifest.webmanifest || true
          fi

          # 5. Uppdatera alla HTML-filer med rätt ?v=
          find . -name "*.html" -type f | while read -r file; do
            sed -i -E 's/(app\.css\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(config\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(auth\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(login-patch\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(db\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(app\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
            sed -i -E 's/(version\.js\?v=)[0-9]+/\1'"$VERSION"'/g' "$file"
          done

      - name: Commit changes
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add version.js deploy.json sw.js manifest.webmanifest . || true
          git add $(find . -name "*.html" -type f) || true
          git commit -m "Bump version to $VERSION" || echo "Inga ändringar att committa"

      - name: Push
        run: git push
