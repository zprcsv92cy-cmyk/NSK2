<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NSK Team 18</title>
  <meta name="theme-color" content="#b11226">

  <script src="./version.js?v=707"></script>
  <script>
    document.write('<link rel="manifest" href="./manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="./app.css?v=' + window.NSK_VERSION + '">');
  </script>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script>
    document.write('<script src="./config.js?v=' + window.NSK_VERSION + '"><\\/script>');
    document.write('<script src="./auth.js?v=' + window.NSK_VERSION + '"><\\/script>');
  </script>
</head>
<body>
  <div style="position:fixed;top:10px;left:10px;z-index:99999;background:#fff;color:#000;padding:8px 12px;border-radius:8px;font-weight:700">
    ROOT 707 TEST
  </div>

  <header class="topbar">
    <div>
      <h1 id="appTitle">NSK Team 18</h1>
      <div class="sub">Logga in för att öppna appen</div>
    </div>
    <div class="topright">
      <div class="badge" id="authStatus">Ej inloggad</div>
    </div>
  </header>

  <section id="loginView" class="view active">
    <div class="card narrow">
      <h2>Logga in</h2>
      <input id="emailInput" type="email" autocomplete="email" placeholder="namn@exempel.se">

      <div class="btnrow">
        <button id="loginBtn">Magic link</button>
        <button id="refreshBtn" class="ghost" type="button">Uppdatera session</button>
      </div>

      <div id="loginMsg" class="msg"></div>
    </div>
  </section>

  <section id="appView" class="view"></section>

  <div id="appError" class="small"></div>

  <script>
    document.title = "NSK Team 18 V" + window.NSK_VERSION;

    window.onerror = function (msg, url, line) {
      const el = document.getElementById("appError");
      if (el) el.textContent = "JS-fel: " + msg + " rad " + line;
      console.error(msg, url, line);
    };

    document.addEventListener("DOMContentLoaded", () => {
      if (window.Auth && typeof window.Auth.init === "function") {
        window.Auth.init().catch((err) => {
          const el = document.getElementById("appError");
          if (el) el.textContent = err.message || String(err);
          console.error(err);
        });
      }
    });
  </script>
</body>
</html>
