<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSK Team 18</title>
<meta name="theme-color" content="#b11226">

<script src="./version.js?v=715"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
document.write('<script src="./config.js?v=' + window.NSK_VERSION + '"><\\/script>');
document.write('<script src="./auth.js?v=' + window.NSK_VERSION + '"><\\/script>');
</script>

<style>

html,body{
margin:0;
padding:0;
background:#0b1020;
color:#fff;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
min-height:100vh;
}

.page{
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:24px;
box-sizing:border-box;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.16);
border-radius:20px;
padding:24px;
box-sizing:border-box;
}

h1{
margin:0 0 10px;
font-size:28px;
}

.sub{
opacity:.8;
margin-bottom:18px;
font-size:15px;
}

input{
width:100%;
height:52px;
border-radius:14px;
border:1px solid rgba(255,255,255,.16);
background:rgba(255,255,255,.08);
color:#fff;
padding:0 14px;
box-sizing:border-box;
font-size:16px;
margin-top:12px;
}

input::placeholder{
color:rgba(255,255,255,.55);
}

.row{
display:flex;
gap:10px;
margin-top:14px;
flex-wrap:wrap;
}

button{
height:52px;
border:0;
border-radius:14px;
padding:0 18px;
font-size:16px;
font-weight:700;
cursor:pointer;
color:#fff;
background:linear-gradient(180deg,#e11d3d,#9f0d20);
}

#authStatus,
#loginMsg,
#appError{
margin-top:14px;
font-size:14px;
}

</style>
</head>

<body>

<section id="loginView" class="page">

<div class="card">

<h1>NSK Team 18</h1>
<div class="sub">Admin login</div>

<input
id="emailInput"
type="email"
autocomplete="email"
placeholder="peter_hasselberg@hotmail.com"
>

<input
id="passwordInput"
type="password"
autocomplete="current-password"
placeholder="Lösenord"
>

<div class="row">
<button id="loginBtn" type="button">Logga in</button>
<button id="refreshBtn" type="button">Uppdatera</button>
</div>

<div id="authStatus">Ej inloggad</div>
<div id="loginMsg"></div>
<div id="appError"></div>

</div>

</section>

<script>

window.onerror=function(msg,url,line,col,err){
const el=document.getElementById("appError");
if(el){
el.textContent="JS-fel: "+msg+" rad "+line;
}
console.error(msg,url,line,col,err);
};

document.addEventListener("DOMContentLoaded",function(){

if(window.Auth && typeof window.Auth.init==="function"){
window.Auth.init().catch(function(err){

const el=document.getElementById("appError");

if(el){
el.textContent=err.message || String(err);
}

console.error(err);

});
}

});

</script>

</body>
</html>
