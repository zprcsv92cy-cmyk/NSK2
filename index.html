<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NSK Login</title>
  <meta name="theme-color" content="#b11226">

  <script src="./version.js?v=707"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="./config.js?v=707"></script>
  <script src="./auth.js?v=707"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #0b1020;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    }
    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 20px;
      padding: 24px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 28px;
    }
    .sub {
      opacity: .8;
      margin-bottom: 18px;
    }
    input {
      width: 100%;
      height: 52px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
      color: #fff;
      padding: 0 14px;
      box-sizing: border-box;
      font-size: 16px;
      margin-top: 12px;
    }
    .row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    button {
      height: 52px;
      border: 0;
      border-radius: 14px;
      padding: 0 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(180deg,#e11d3d,#9f0d20);
    }
    #loginMsg, #appError, #authStatus {
      margin-top: 14px;
      opacity: .9;
      font-size: 14px;
      word-break: break-word;
    }
    #appView {
      display: none;
    }
  </style>
</head>
<body>
  <section id="loginView" class="page">
    <div class="card">
      <h1>NSK Team 18</h1>
      <div class="sub">Logga in för att öppna appen</div>

      <input id="emailInput" type="email" autocomplete="email" placeholder="namn@exempel.se">
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="Lösenord">

      <div class="row">
        <button id="loginBtn" type="button">Logga in</button>
        <button id="refreshBtn" type="button">Uppdatera</button>
      </div>

      <div id="authStatus">Ej inloggad</div>
      <div id="loginMsg"></div>
      <div id="appError"></div>
    </div>
  </section>

  <section id="appView"></section>

  <script>
    window.onerror = function (msg, url, line, col, err) {
      var el = document.getElementById("appError");
      if (el) el.textContent = "JS-fel: " + msg + " rad " + line;
      console.error(msg, url, line, col, err);
    };

    document.addEventListener("DOMContentLoaded", function () {
      if (window.Auth && typeof window.Auth.init === "function") {
        window.Auth.init().catch(function (err) {
          var el = document.getElementById("appError");
          if (el) el.textContent = err.message || String(err);
          console.error(err);
        });
      } else {
        var el = document.getElementById("appError");
        if (el) el.textContent = "Auth.init saknas";
      }
    });
  </script>
</body>
</html>
