<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NSK Team 18 V6.3</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="./app.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="topbar">
<h1>NSK Team 18 – V6.3</h1>
<div class="badge" id="authBadge">Ej inloggad</div>
<div class="badge" id="syncBadge">lokal</div>
</header>

<section id="loginView" class="view active">
<h2>Logga in</h2>
<input id="loginEmail" placeholder="email">
<button id="btnSendLink">Magic link</button>
<div id="loginMsg"></div>
</section>

<section id="appView" class="view">
<h2>Poolspel</h2>

<div>
<label>Namn</label>
<input id="poolName">
</div>

<div>
<label>Moln‑ID</label>
<input id="poolCloudId" placeholder="auto eller ange eget">
</div>

<button id="btnSavePool">Spara</button>
<button id="btnSync">Synka</button>
<button id="btnPull">Hämta</button>

<h3>Matcher</h3>
<div id="matches"></div>
<button id="btnAddMatch">Ny match</button>

</section>

<script src="./db.js"></script>
<script src="./auth.js"></script>
<script src="./app.js"></script>

</body>
</html>
