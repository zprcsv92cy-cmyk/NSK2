<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skapa poolspel</title>

<link rel="stylesheet" href="../app.css?v=13">

</head>

<body>

<div class="wrap">

<div class="hero">
<img src="../icon-192.png">

<div>
<div class="hero-title">NSK Lag</div>
<div class="hero-sub">
Matchinfo • Laguppställning • Byten • PDF
</div>
</div>
</div>


<div class="glass">

<div class="grid2">

<div class="field">
<label>Lag</label>
<select id="cfgTeamNo">
<option>Lag 1</option>
<option>Lag 2</option>
<option>Lag 3</option>
</select>
</div>

<div class="field">
<label>Antal matcher</label>
<select id="cfgMatchesTotal">
<option>1</option>
<option>2</option>
<option selected>4</option>
<option>6</option>
</select>
</div>

<div class="field">
<label>Match</label>
<select id="cfgMatchNo">
<option>Match 1</option>
<option>Match 2</option>
<option>Match 3</option>
<option>Match 4</option>
</select>
</div>

<div class="field">
<label>Datum</label>
<input type="date">
</div>

<div class="field full">
<label>Starttid</label>
<input type="time">
</div>

<div class="field">
<label>Motståndare</label>
<input placeholder="Skriv motståndare">
</div>

<div class="field">
<label>Plan</label>
<select>
<option>Plan 1</option>
<option>Plan 2</option>
<option>Plan 3</option>
</select>
</div>

<div class="field">
<label>Antal i laget</label>
<select>
<option>10</option>
<option>11</option>
<option>12</option>
</select>
</div>

<div class="field">
<label>Antal på plan</label>
<select>
<option>3</option>
<option>4</option>
<option>5</option>
</select>
</div>

<div class="field">
<label>Perioder per match</label>
<select>
<option>1</option>
<option>2</option>
</select>
</div>

<div class="field">
<label>Periodtid (min)</label>
<select>
<option>10</option>
<option selected>15</option>
<option>20</option>
</select>
</div>

<div class="field full">
<label>Bytestid (sek)</label>
<select>
<option>60</option>
<option selected>90</option>
<option>120</option>
</select>
</div>

</div>

<div style="display:flex;justify-content:space-between;margin-top:18px">

<div class="helper">
Allt sparas automatiskt per lag + match.
</div>

<button class="primary-btn">
Redo
</button>

</div>

</div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../auth.js"></script>
<script src="../db.js"></script>
<script src="../app.js"></script>

</body>
</html>
