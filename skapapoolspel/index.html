<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Skapa poolspel</title>
<link rel="stylesheet" href="../app.css?v=500">
</head>

<body>
<div class="wrap">

<nav class="mainmenu">
<a href="../startsida/">Startsida</a>
<a href="../truppen/">Truppen</a>
<a href="../skapapoolspel/" class="active">Skapa poolspel</a>
<a href="../malvaktsstatistik/">Målvaktsstatistik</a>
<a href="../bytesschema/">Bytesschema</a>
<a href="../matchvy/">Matchvy</a>
<a href="../lag/">Lag</a>
</nav>

<section class="card">
<h2>Poolspel</h2>

<label>Datum</label>
<input type="date" id="poolDate">

<label>Ort</label>
<input type="text" id="poolPlace" placeholder="Ort">

</section>

<section class="card">

<h2>Förutsättningar</h2>

<label>Antal lag</label>
<select id="teams">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
</select>

<label>Antal matcher</label>
<select id="matches">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>

<label>Antal på plan</label>
<select id="players">
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<label>Perioder per match</label>
<select id="periods">
<option>1</option>
<option>2</option>
<option>3</option>
</select>

<label>Periodtid</label>
<select id="periodTime">
<option>10</option>
<option>12</option>
<option>15</option>
<option>20</option>
</select>

<label>Bytestid (sek)</label>
<select id="subTime">
<option>30</option>
<option>45</option>
<option>60</option>
<option>75</option>
<option>90</option>
</select>

<button id="savePool">Spara poolspel</button>

</section>

<section class="card">

<h2>Lag</h2>

<div id="teamButtons"></div>

</section>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="../config.js"></script>
<script src="../auth.js"></script>
<script src="../db.js"></script>
<script src="../app.js"></script>

</div>
</body>
</html>
