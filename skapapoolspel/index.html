<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Skapa poolspel</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=708"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/" class="active">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/">Bytesschema</a>
      <a href="../matchvy/">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="hero-card">
      <img src="../icon-192.png" alt="NSK" class="hero-logo">
      <div>
        <h1 class="hero-title">Skapa poolspel</h1>
        <div class="hero-sub">Ställ in ort, datum och förutsättningar</div>
      </div>
    </section>

    <section class="card">
      <h2>Förutsättningar</h2>

      <label for="poolPlace">Ort</label>
      <input id="poolPlace" type="text" placeholder="t.ex. Gnesta">

      <label for="poolDate">Datum</label>
      <input id="poolDate" type="date">

      <label for="teams">Antal lag</label>
      <select id="teams">
        <option value="1">1</option>
        <option value="2" selected>2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>

      <label for="matches">Antal matcher</label>
      <select id="matches">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="5">5</option>
        <option value="6">6</option>
      </select>

      <label for="players">Spelare på planen</label>
      <select id="players">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>

      <label for="periods">Antal perioder</label>
      <select id="periods">
        <option value="1" selected>1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>

      <label for="periodTime">Periodtid (min)</label>
      <select id="periodTime">
        <option value="10">10</option>
        <option value="12">12</option>
        <option value="15" selected>15</option>
        <option value="20">20</option>
      </select>

      <label for="subTime">Bytestid (sek)</label>
      <select id="subTime">
        <option value="60">60</option>
        <option value="75">75</option>
        <option value="90" selected>90</option>
        <option value="120">120</option>
      </select>

      <button id="savePool" type="button">Spara poolspel</button>
      <div id="poolMsg" class="small"></div>
    </section>

    <section class="card">
      <h2>Laguppställning</h2>
      <div class="small">Välj lag för att skapa laguppställning</div>
      <div id="lagButtons" class="team-buttons"></div>
    </section>

    <div id="appError" class="small"></div>

   <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
</script>
  </div>
</body>
</html>
