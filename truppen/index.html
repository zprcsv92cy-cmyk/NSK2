<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Truppen</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=709"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/" class="active">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/">Bytesschema</a>
      <a href="../matchvy/">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="hero-card">
      <img src="../icon-192.png" alt="NSK" class="hero-logo">
      <div>
        <h1 class="hero-title">NSK Lag</h1>
        <div class="hero-sub">Truppen • Spelare • Tränare • Molnsynk</div>
      </div>
    </section>

    <section class="card truppen-card">
      <div class="section-head">
        <h2>Spelare</h2>
        <div id="playersMsg" class="small"></div>
      </div>

      <div class="truppen-add-row">
        <input id="playerInput" class="name-input" placeholder="Förnamn Efternamn">
        <button id="addPlayerBtn" class="big-add">Lägg till</button>
      </div>

      <div id="playersList" class="person-list"></div>
      <div class="muted-note">Tryck Spara för att uppdatera. Dra handtaget för att sortera.</div>
    </section>

    <section class="card truppen-card">
      <div class="section-head">
        <h2>Tränare</h2>
        <div id="coachesMsg" class="small"></div>
      </div>

      <div class="truppen-add-row">
        <input id="coachInput" class="name-input" placeholder="Förnamn Efternamn">
        <button id="addCoachBtn" class="big-add">Lägg till</button>
      </div>

      <div id="coachesList" class="person-list"></div>
      <div class="muted-note">Tryck Spara för att uppdatera. Dra handtaget för att sortera.</div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
  document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
</script>
  </div>
</body>
</html>
