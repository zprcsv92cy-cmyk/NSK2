<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Truppen Team 18</title>
  <link rel="stylesheet" href="/NSK2/app.css">
</head>
<body>
  <div class="sheet">
    <div class="sheet-top">
      <div class="sheet-title">Truppen team 18</div>
      <a class="close-btn" href="/NSK2/startsida/" aria-label="Stäng">×</a>
    </div>

    <section class="block">
      <div class="toolbar-small">
        <h2>Spelare</h2>
        <div id="playersMsg" class="mini-msg"></div>
      </div>
      <input id="playerInput" class="name-input" placeholder="Förnamn Efternamn">
      <button id="addPlayerBtn" class="big-add">Lägg till</button>
      <div id="playersList"></div>
      <div class="muted-note">Antal spelare: <span id="teamCount"></span></div>
    </section>

    <section class="block">
      <div class="toolbar-small">
        <h2>Tränare</h2>
        <div id="coachesMsg" class="mini-msg"></div>
      </div>
      <input id="coachInput" class="name-input" placeholder="Förnamn Efternamn">
      <button id="addCoachBtn" class="big-add">Lägg till</button>
      <div id="coachesList"></div>
    </section>

    <section class="block">
      <h2>Backup</h2>
      <div class="muted-note">Appen använder nu Supabase live-sync. Export kan läggas till senare.</div>
    </section>
    
<div id="appError" class="small"></div>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="/NSK2/config.js"></script>
<script src="/NSK2/auth.js"></script>
<script src="/NSK2/db.js"></script>
<script src="/NSK2/app.js"></script>

  </div>
</body>
</html>
