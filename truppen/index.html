<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Truppen Team 18</title>
  <link rel="stylesheet" href="/NSK2/app.css?v=104">
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="/NSK2/startsida/">Startsida</a>
      <a href="/NSK2/truppen/">Truppen</a>
      <a href="/NSK2/skapapoolspel/">Skapa poolspel</a>
      <a href="/NSK2/malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="/NSK2/bytesschema/">Bytesschema</a>
      <a href="/NSK2/matchvy/">Matchvy</a>
      <a href="/NSK2/lag/">Lag</a>
    </nav>

    <div class="sheet">
      <div class="sheet-top">
        <div class="sheet-title">Truppen team 18</div>
        <a class="close-btn" href="/NSK2/startsida/" aria-label="Stäng">×</a>
      </div>

      <section class="block">
        <div class="toolbar-small">
          <h2>Spelare</h2>
          <div id="playersMsg" class="small"></div>
        </div>

        <input id="playerInput" class="name-input" placeholder="Förnamn Efternamn">
        <button id="addPlayerBtn" class="big-add">Lägg till</button>

        <div id="playersList"></div>

        <div class="muted-note">Sorteras A–Ö. Sparas i molnet.</div>
      </section>

      <section class="block">
        <div class="toolbar-small">
          <h2>Tränare</h2>
          <div id="coachesMsg" class="small"></div>
        </div>

        <input id="coachInput" class="name-input" placeholder="Förnamn Efternamn">
        <button id="addCoachBtn" class="big-add">Lägg till</button>

        <div id="coachesList"></div>

        <div class="muted-note">Sorteras A–Ö. Sparas i molnet.</div>
      </section>

      <section class="block">
        <h2>Backup / Flytta till annan telefon</h2>
        <div class="muted-note">Export/Import av register + alla poolspel från Supabase.</div>

        <div class="backup-actions">
          <button id="exportBtn" class="ghost big-export">Exportera JSON</button>
        </div>

        <div class="import-wrap">
          <label for="importFile" class="import-label">Importera JSON</label>
          <input id="importFile" type="file" accept="application/json,.json">
        </div>

        <div id="backupMsg" class="small"></div>
      </section>
    </div>

    <div id="appError" class="small"></div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/NSK2/config.js?v=200"></script>
    <script src="/NSK2/auth.js?v=200"></script>
    <script src="/NSK2/login-patch.js?v=104"></script>
    <script src="/NSK2/db.js?v=200"></script>
    <script src="/NSK2/app.js?v=200"></script>
  </div>
</body>
</html>
