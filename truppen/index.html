<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Truppen Team 18 V12 Debug</title>
  <link rel="stylesheet" href="/NSK2/app.css?v=120">
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="/NSK2/startsida/">Startsida</a>
      <a href="/NSK2/truppen/">Truppen</a>
      <a href="/NSK2/skapapoolspel/">Skapa poolspel</a>
      <a href="/NSK2/malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="/NSK2/bytesschema/">Bytesschema</a>
      <a href="/NSK2/matchvy/">Matchvy</a>
      <a href="/NSK2/lag/">Lag</a>
    </nav>

    <div class="sheet">
      <div class="sheet-top">
        <div class="sheet-title">Truppen team 18</div>
        <a class="close-btn" href="/NSK2/startsida/" aria-label="Stäng">×</a>
      </div>

      <section class="block">
        <div class="toolbar-small">
          <h2>Spelare</h2>
        </div>
        <input id="playerInput" class="name-input" placeholder="Förnamn Efternamn">
        <button id="addPlayerBtn" class="big-add">Lägg till spelare</button>
        <div id="playersList"></div>
      </section>

      <section class="block">
        <div class="toolbar-small">
          <h2>Tränare</h2>
        </div>
        <input id="coachInput" class="name-input" placeholder="Förnamn Efternamn">
        <button id="addCoachBtn" class="big-add">Lägg till tränare</button>
        <div id="coachesList"></div>
      </section>

      <section class="block">
        <h2>Debug</h2>
        <div class="muted-note">Visar exakt varför spelare inte laddas: Auth, config, team_id, Supabase eller RLS.</div>
        <pre id="debugBox" style="white-space:pre-wrap;color:#fff;background:#111217;border:1px solid #2d2f36;border-radius:18px;padding:16px;min-height:180px;"></pre>
      </section>
    </div>

    <div id="appError" class="small"></div>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/NSK2/config.js?v=120"></script>
    <script src="/NSK2/auth.js?v=120"></script>
    <script src="/NSK2/login-patch.js?v=120"></script>
    <script src="/NSK2/db.js?v=120"></script>
    <script src="/NSK2/app.js?v=120"></script>
  </div>
</body>
</html>
