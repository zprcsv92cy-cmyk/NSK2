  <link rel="stylesheet" href="../app.css">
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>

<section class="card">
  <h1>Matchvy</h1>
  <div id="matchInfo"></div>
  <div class="coach-grid">
    <div class="coach-box">
      <div class="coach-label">NU</div>
      <div id="currentPlayers" class="coach-main">—</div>
    </div>
    <div class="coach-box">
      <div class="coach-label">NÄSTA</div>
      <div id="nextPlayers" class="coach-next">—</div>
    </div>
  </div>
  <div class="timerwrap">
    <div id="matchTimer" class="timer">00:00</div>
    <div class="btnrow">
      <button id="startTimerBtn">Start</button>
      <button id="stopTimerBtn" class="ghost">Stoppa</button>
      <button id="nextShiftBtn" class="ghost">Nästa byte</button>
    </div>
  </div>
</section>


    <div id="appError" class="small"></div>

    <script src="../config.js"></script>
    <script src="../auth.js"></script>
    <script src="../login-patch.js"></script>
    <script src="../db.js"></script>

  </div>
