<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Matchvy</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=716"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/">Bytesschema</a>
      <a href="../matchvy/" class="active">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="card coach-live-card">
      <div class="matchvy-topline">
        <div class="matchvy-pool" id="matchPoolName">Poolspel: —</div>
        <div class="matchvy-team" id="matchTeamName">Lag: —</div>
      </div>

      <h1 class="matchvy-main-title">Matchvy</h1>
      <div class="matchvy-subtitle" id="matchShiftHeading">Pågående byte 1</div>

      <div class="matchvy-meta" id="matchInfoLine">Motståndare: — • Plan: — • Start: —</div>

      <div class="matchvy-panels">
        <div class="matchvy-panel current-panel">
          <div class="matchvy-panel-label">PÅGÅENDE BYTE</div>
          <div class="matchvy-shift-no" id="currentShiftNo">Byte 1</div>
          <div class="matchvy-time" id="currentShiftTime">Byte kl —</div>
          <div id="currentPlayers" class="matchvy-player-list">—</div>
        </div>

        <div class="matchvy-panel next-panel">
          <div class="matchvy-panel-label">NÄSTA BYTE</div>
          <div class="matchvy-shift-no" id="nextShiftNo">Byte 2</div>
          <div class="matchvy-time" id="nextShiftTime">Byte kl —</div>
          <div id="nextPlayers" class="matchvy-player-list">—</div>
        </div>
      </div>

      <div class="matchvy-timer-block">
        <div class="matchvy-panel-label">NÄSTA BYTE OM</div>
        <div id="matchTimer" class="matchvy-timer">01:30</div>
      </div>

      <div class="matchvy-nav-row">
        <button id="prevShiftBtn" type="button" class="row-btn ghost-wide">Föregående byte</button>
        <button id="nextShiftBtn" type="button" class="row-btn primary-wide">Nästa byte</button>
      </div>

      <div id="matchMsg" class="small"></div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
    </script>
  </div>
</body>
</html>
