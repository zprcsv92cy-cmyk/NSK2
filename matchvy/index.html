<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Matchvy</title>
  <link rel="stylesheet" href="/NSK2/app.css?v=655">
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="/NSK2/startsida/">Startsida</a>
      <a href="/NSK2/truppen/">Truppen</a>
      <a href="/NSK2/skapapoolspel/">Skapa poolspel</a>
      <a href="/NSK2/malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="/NSK2/bytesschema/">Bytesschema</a>
      <a href="/NSK2/matchvy/" class="active">Matchvy</a>
      <a href="/NSK2/lag/">Lag</a>
    </nav>

    <section class="hero-card">
      <img src="/NSK2/icon-192.png" alt="NSK" class="hero-logo">
      <div>
        <h1 class="hero-title">Matchvy</h1>
        <div class="hero-sub">Nuvarande och nästa byte</div>
      </div>
    </section>

    <section class="card">
      <div id="coachCard" class="coach-card">
        <div class="toolbar">
          <h2>Coachläge</h2>
          <div class="btnrow">
            <button id="prevMatch" class="ghost">Föregående</button>
            <button id="nextMatch" class="ghost">Nästa</button>
          </div>
        </div>
        <div class="coach-grid">
          <div class="coach-box">
            <div class="coach-label">NU</div>
            <div id="coachCurrentMatch" class="coach-meta">—</div>
            <div id="coachCurrentPlayers" class="coach-main">—</div>
          </div>
          <div class="coach-box">
            <div class="coach-label">NÄSTA</div>
            <div id="coachNextMatch" class="coach-meta">—</div>
            <div id="coachNextPlayers" class="coach-next">—</div>
          </div>
        </div>
      </div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="/NSK2/config.js?v=655"></script>
    <script src="/NSK2/auth.js?v=655"></script>
    <script src="/NSK2/login-patch.js?v=655"></script>
    <script src="/NSK2/db.js?v=655"></script>
    <script src="/NSK2/app.js?v=655"></script>
  </div>
</body>
</html>
