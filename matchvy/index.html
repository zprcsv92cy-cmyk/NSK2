<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Matchvy</title>
  <meta name="theme-color" content="#b11226">

  <script src="../version.js?v=717"></script>
  <script>
    document.write('<link rel="manifest" href="../manifest.webmanifest?v=' + window.NSK_VERSION + '">');
    document.write('<link rel="stylesheet" href="../app.css?v=' + window.NSK_VERSION + '">');
  </script>
</head>
<body>
  <div class="wrap">
    <nav class="mainmenu">
      <a href="../startsida/">Startsida</a>
      <a href="../truppen/">Truppen</a>
      <a href="../skapapoolspel/">Skapa poolspel</a>
      <a href="../malvaktsstatistik/">Målvaktsstatistik</a>
      <a href="../bytesschema/">Bytesschema</a>
      <a href="../matchvy/" class="active">Matchvy</a>
      <a href="../lag/">Lag</a>
    </nav>

    <section class="card coach-screen-card coach-mode-card">
      <div class="coach-mode-header">
        <div class="coach-match-meta">
          <div id="shiftLabel" class="coach-big-title">Inget schema</div>
          <div id="matchInfo" class="coach-match-info"></div>
        </div>
        <div class="coach-timer-panel">
          <div class="coach-panel-label">BYTE OM</div>
          <div id="matchTimer" class="coach-timer">00:00</div>
        </div>
      </div>

      <div class="coach-byte-meta">
        <div id="currentShiftMeta" class="coach-byte-meta-box">Pågående byte: —</div>
        <div id="nextShiftMeta" class="coach-byte-meta-box">Nästa byte: —</div>
      </div>

      <div class="coach-panels coach-panels-big">
        <div class="coach-panel coach-panel-current">
          <div class="coach-panel-label coach-panel-label-big">PÅGÅENDE BYTE</div>
          <div id="currentPlayers" class="coach-panel-main coach-panel-main-big">—</div>
        </div>

        <div class="coach-panel coach-panel-nextbox">
          <div class="coach-panel-label coach-panel-label-big">NÄSTA BYTE</div>
          <div id="nextPlayers" class="coach-panel-next coach-panel-next-big">—</div>
        </div>
      </div>

      <div class="btnrow coach-nav-row">
        <button id="prevShiftBtn" class="row-btn coach-nav-btn ghost" type="button">Föregående byte</button>
        <button id="nextShiftBtn" class="row-btn coach-nav-btn" type="button">Nästa byte</button>
      </div>
    </section>

    <div id="appError" class="small"></div>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script>
      document.write('<script src="../config.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../auth.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../db.js?v=' + window.NSK_VERSION + '"><\/script>');
      document.write('<script src="../app.js?v=' + window.NSK_VERSION + '"><\/script>');
    </script>
  </div>
</body>
</html>
